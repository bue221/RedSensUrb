server.port=${COORDINATOR_REST_PORT:8080}
app.udp.port=${COORDINATOR_UDP_PORT:9000}
app.api.token=${API_TOKEN:changeme-token}

spring.datasource.url=jdbc:sqlite:${SQLITE_PATH:/data/redsensurb.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always

# JSON serialization: ISO-8601 strings for Instant (front-end compatibility)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# CORS (override with comma-separated origins in prod, e.g. https://app.example.com)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
